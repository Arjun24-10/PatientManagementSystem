# -------------------------
# H2 TEST DATABASE
# -------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# -------------------------
# DISABLE REDIS DURING TESTS
# -------------------------
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# -------------------------
# JWT
# -------------------------
jwt.secret=dGVzdC1zZWNyZXQta2V5LWZvci1qdW5pdC10ZXN0cy1vbmx5LTEyMzQ1Njc4OTA=
jwt.expiration=3600000

# -------------------------
# MOCK EMAIL CONFIG
# -------------------------
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test
spring.mail.password=test

# -------------------------
# DISABLE SECURITY DEBUG NOISE
# -------------------------
logging.level.org.springframework.security=ERROR

# -------------------------
# ACTUATOR FOR PROMETHEUS TEST
# FIX 1: Expose all endpoints with wildcard so prometheus is never accidentally excluded
# FIX 2: Added Spring Boot 3.x property name for prometheus (the old 2.x name
#         management.metrics.export.prometheus.enabled is ignored in Boot 3.x)
# -------------------------
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.endpoint.health.enabled=true
management.metrics.export.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true

spring.main.allow-bean-definition-overriding=true

# -------------------------
# APP CONFIG (ENCRYPTION & STORAGE)
# -------------------------
app.encryption.key=dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItanVuaXQtdGVzdHM=
upload.dir=./test-uploads
backup.dir=./test-backups
archival.enabled=false
backup.enabled=false
