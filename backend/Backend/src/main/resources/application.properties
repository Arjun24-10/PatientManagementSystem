spring.application.name=backend
# Database Configuration
# We use environment variables so this works in Docker AND locally
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthcare_auth_db?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:temp_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:temp_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
# -------------------------
# APPLICATION LOGGING
# -------------------------

# Root log level
logging.level.root=INFO

# Log API requests (Spring Web)
logging.level.org.springframework.web=INFO

# Log Hibernate SQL queries (better way than show-sql)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Write logs to file
logging.file.name=logs/backend.log

# Log pattern (clean readable format)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %level - %logger{36} - %msg%n
logging.pattern.console=%d{HH:mm:ss} - %level - %msg%n
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# For sending otp through mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=900000 
# 900000 ms = 15 minutes

# Frontend URL for password reset links
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
server.port=${SERVER_PORT:8080}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

spring.mail.properties.mail.smtp.ssl.trust=*


spring.data.redis.host=localhost
spring.data.redis.port=6379
# If using Docker networking, use the container name:
# spring.data.redis.host=redis

logging.level.org.springframework.security=TRACE

# -------------------------
# ACTUATOR + PROMETHEUS
# -------------------------

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,prometheus

management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.cache.time-to-live=0
management.metrics.export.prometheus.openmetrics.enabled=false

server.tomcat.relaxed-path-chars=_
server.tomcat.relaxed-query-chars=_