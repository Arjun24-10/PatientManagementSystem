spring.application.name=backend
# Database Configuration
# We use environment variables so this works in Docker AND locally
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/healthcare_auth_db?stringtype=unspecified}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:temp_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:temp_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# For sending otp through mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=900000 
# 900000 ms = 15 minutes

# Frontend URL for password reset links
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
server.port=${SERVER_PORT:8080}

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

spring.mail.properties.mail.smtp.ssl.trust=*


spring.data.redis.host=localhost
spring.data.redis.port=6379
# If using Docker networking, use the container name:
# spring.data.redis.host=redis

logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:TRACE}

# File Upload Configuration
app.upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AES-256 Encryption Key (Base64-encoded 32-byte key)
# IMPORTANT: Generate your own key for production! Use: openssl rand -base64 32
app.encryption.key=${APP_ENCRYPTION_KEY:dGhpcyBpcyBhIDMyIGJ5dGUga2V5IGZvciB0ZXN0aW5nIQ==}

# Database Backup Configuration
backup.enabled=${BACKUP_ENABLED:true}
backup.cron=${BACKUP_CRON:0 0 2 * * *}
backup.directory=${BACKUP_DIR:./backups}
backup.retention-days=${BACKUP_RETENTION:7}

# Data Archival Configuration
archival.enabled=${ARCHIVAL_ENABLED:true}
archival.cron=${ARCHIVAL_CRON:0 0 3 * * SUN}
archival.inactivity-days=${ARCHIVAL_INACTIVITY_DAYS:365}